<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="JARVIS">
<title>JARVIS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --bg: #0a0a1a;
    --panel: #0f0f2a;
    --border: #1a2a4a;
    --accent: #00d4ff;
    --accent2: #0066ff;
    --text: #e0f0ff;
    --muted: #4a6a8a;
    --danger: #ff4444;
    --green: #00ff88;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-shrink: 0;
  }

  .logo {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--accent);
    text-shadow: 0 0 20px var(--accent);
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: all 0.3s;
  }
  .status-dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .status-dot.listening { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* API KEY SCREEN */
  #keyScreen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    gap: 16px;
  }

  #keyScreen h2 {
    color: var(--accent);
    font-size: 18px;
    letter-spacing: 2px;
  }

  #keyScreen p {
    color: var(--muted);
    font-size: 13px;
    text-align: center;
  }

  input[type="text"], input[type="password"] {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border 0.2s;
  }
  input:focus { border-color: var(--accent); }

  .btn {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 1px;
    transition: opacity 0.2s;
  }
  .btn:active { opacity: 0.8; }
  .btn.danger { background: var(--danger); }
  .btn.small { padding: 8px 14px; font-size: 13px; width: auto; border-radius: 20px; }

  /* TABS */
  #mainScreen { flex: 1; display: none; flex-direction: column; overflow: hidden; }
  #mainScreen.active { display: flex; }

  .tabs-bar {
    display: flex;
    align-items: center;
    padding: 8px 12px;
    gap: 8px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    overflow-x: auto;
    flex-shrink: 0;
    scrollbar-width: none;
  }
  .tabs-bar::-webkit-scrollbar { display: none; }

  .tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 20px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .tab.active {
    background: var(--accent2);
    border-color: var(--accent2);
    color: white;
  }
  .tab .close-tab {
    font-size: 14px;
    line-height: 1;
    opacity: 0.6;
  }

  .new-tab-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .new-tab-btn:active { background: var(--border); }

  /* CHAT */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .msg {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
  }
  .msg.user {
    align-self: flex-end;
    background: var(--accent2);
    color: white;
    border-bottom-right-radius: 4px;
  }
  .msg.assistant {
    align-self: flex-start;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }
  .msg.system {
    align-self: center;
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    border: none;
    padding: 4px;
  }

  .typing {
    align-self: flex-start;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    padding: 12px 16px;
    display: flex;
    gap: 4px;
  }
  .typing span {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: typing 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

  /* INPUT */
  .input-area {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    background: var(--panel);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  textarea {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 20px;
    font-size: 14px;
    outline: none;
    resize: none;
    max-height: 120px;
    min-height: 42px;
    font-family: inherit;
    line-height: 1.4;
    transition: border 0.2s;
  }
  textarea:focus { border-color: var(--accent); }

  .mic-btn {
    width: 42px; height: 42px;
    border-radius: 50%;
    border: none;
    background: var(--border);
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .mic-btn.recording {
    background: var(--danger);
    animation: pulse 1s infinite;
  }

  .send-btn {
    width: 42px; height: 42px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: white;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s;
  }
  .send-btn:active { opacity: 0.7; }

  /* VOICE WAVE */
  .voice-indicator {
    display: none;
    align-self: center;
    align-items: center;
    gap: 3px;
    padding: 8px 0;
  }
  .voice-indicator.active { display: flex; }
  .voice-indicator span {
    width: 3px;
    background: var(--accent);
    border-radius: 2px;
    animation: wave 1s infinite;
  }
  .voice-indicator span:nth-child(1) { height: 8px; animation-delay: 0s; }
  .voice-indicator span:nth-child(2) { height: 16px; animation-delay: 0.1s; }
  .voice-indicator span:nth-child(3) { height: 24px; animation-delay: 0.2s; }
  .voice-indicator span:nth-child(4) { height: 16px; animation-delay: 0.3s; }
  .voice-indicator span:nth-child(5) { height: 8px; animation-delay: 0.4s; }
  @keyframes wave { 0%,100%{transform:scaleY(0.4)} 50%{transform:scaleY(1)} }

  /* QUICK ACTIONS */
  .quick-actions {
    display: flex;
    gap: 8px;
    padding: 8px 16px;
    overflow-x: auto;
    scrollbar-width: none;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }
  .quick-actions::-webkit-scrollbar { display: none; }
  .qa-btn {
    padding: 5px 12px;
    border-radius: 16px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .qa-btn:active { background: var(--border); color: var(--text); }

  /* SETTINGS */
  #settingsPanel {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: flex-end;
  }
  #settingsPanel.open { display: flex; }
  .settings-sheet {
    background: var(--panel);
    border-top: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-height: 70vh;
    overflow-y: auto;
  }
  .settings-sheet h3 { color: var(--accent); letter-spacing: 2px; font-size: 14px; }
  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .setting-row label { font-size: 14px; color: var(--text); }
  .setting-row span { font-size: 12px; color: var(--muted); }

  .error-msg {
    color: var(--danger);
    font-size: 12px;
    text-align: center;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">J.A.R.V.I.S</div>
  <div style="display:flex;gap:10px;align-items:center;">
    <button onclick="openSettings()" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;">⚙️</button>
    <div class="status-dot" id="statusDot"></div>
  </div>
</header>

<!-- API KEY SCREEN -->
<div id="keyScreen">
  <h2>🔐 API ANAHTARI</h2>
  <p>Groq API anahtarını gir (gsk_ ile başlayan)</p>
  <input type="password" id="apiKeyInput" placeholder="gsk_..." />
  <input type="text" id="userNameInput" placeholder="Adın ne? (örn: Utku)" />
  <div id="keyError" class="error-msg"></div>
  <button class="btn" onclick="saveApiKey()">BAĞLAN</button>
</div>

<!-- MAIN SCREEN -->
<div id="mainScreen">
  <!-- TABS -->
  <div class="tabs-bar" id="tabsBar">
    <button class="new-tab-btn" onclick="newTab()" title="Yeni sohbet">+</button>
  </div>

  <!-- QUICK ACTIONS -->
  <div class="quick-actions">
    <button class="qa-btn" onclick="quickAction('YouTube aç')">▶ YouTube</button>
    <button class="qa-btn" onclick="quickAction('WhatsApp aç')">💬 WhatsApp</button>
    <button class="qa-btn" onclick="quickAction('Google aç')">🔍 Google</button>
    <button class="qa-btn" onclick="quickAction('Instagram aç')">📸 Instagram</button>
    <button class="qa-btn" onclick="quickAction('Haritayı aç')">🗺️ Harita</button>
    <button class="qa-btn" onclick="quickAction('Hava durumunu söyle')">🌤️ Hava</button>
    <button class="qa-btn" onclick="quickAction('Beni hatırlat, kim benim?')">🧠 Hafıza</button>
  </div>

  <!-- CHAT -->
  <div class="chat-area" id="chatArea"></div>

  <!-- VOICE WAVE -->
  <div class="voice-indicator" id="voiceIndicator">
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <textarea id="msgInput" placeholder="Bir şey yaz..." rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"></textarea>
    <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<!-- SETTINGS PANEL -->
<div id="settingsPanel" onclick="closeSettingsOutside(event)">
  <div class="settings-sheet">
    <h3>⚙️ AYARLAR</h3>
    <div class="setting-row">
      <label>API Anahtarı</label>
      <button class="btn small danger" onclick="resetApiKey()">Sıfırla</button>
    </div>
    <div class="setting-row">
      <label>Kullanıcı Adı</label>
      <span id="settingsUserName">-</span>
    </div>
    <div class="setting-row">
      <label>Hafızayı Sil</label>
      <button class="btn small danger" onclick="clearMemory()">Sil</button>
    </div>
    <div class="setting-row">
      <label>Tüm Sohbetleri Sil</label>
      <button class="btn small danger" onclick="clearAll()">Temizle</button>
    </div>
    <div class="setting-row">
      <label>Sürüm</label>
      <span>JARVIS v1.0</span>
    </div>
    <button class="btn" onclick="closeSettings()">KAPAT</button>
  </div>
</div>

<script>
// ============ STATE ============
let apiKey = '';
let userName = '';
let tabs = [];
let activeTabId = null;
let isRecording = false;
let recognition = null;
let memory = {};

const SYSTEM_PROMPT = `Sen JARVIS'sin - gelişmiş bir yapay zeka asistanı. Kullanıcının adı: {NAME}.

Hafıza:
{MEMORY}

Kurallar:
- Türkçe konuş, samimi ve zeki ol
- Kullanıcıyı adıyla hitap et
- Eğer kullanıcı uygulama açmamı isterse şu formatı kullan: [OPEN:url]
  Örnek: YouTube için [OPEN:https://youtube.com], WhatsApp için [OPEN:https://wa.me], Google için [OPEN:https://google.com]
- Eğer video araması isterlerse: [OPEN:https://youtube.com/results?search_query=QUERY]
- Önemli bilgileri hatırla ve hafızaya al
- Kısa ve net cevaplar ver
- Samimi, yardımsever ve biraz espirili ol`;

// ============ INIT ============
function init() {
  apiKey = localStorage.getItem('jarvis_key') || '';
  userName = localStorage.getItem('jarvis_user') || '';
  memory = JSON.parse(localStorage.getItem('jarvis_memory') || '{}');
  
  const savedTabs = JSON.parse(localStorage.getItem('jarvis_tabs') || '[]');
  
  if (apiKey) {
    showMain();
    if (savedTabs.length > 0) {
      tabs = savedTabs;
      activeTabId = localStorage.getItem('jarvis_active_tab') || tabs[0].id;
      renderTabs();
      renderChat();
    } else {
      newTab();
    }
  }
}

// ============ API KEY ============
function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  const name = document.getElementById('userNameInput').value.trim();
  
  if (!key || !key.startsWith('gsk_')) {
    document.getElementById('keyError').textContent = 'Geçersiz anahtar! gsk_ ile başlamalı.';
    return;
  }
  if (!name) {
    document.getElementById('keyError').textContent = 'Adını gir!';
    return;
  }
  
  apiKey = key;
  userName = name;
  localStorage.setItem('jarvis_key', key);
  localStorage.setItem('jarvis_user', name);
  
  showMain();
  newTab();
}

function resetApiKey() {
  localStorage.removeItem('jarvis_key');
  localStorage.removeItem('jarvis_user');
  location.reload();
}

function showMain() {
  document.getElementById('keyScreen').style.display = 'none';
  document.getElementById('mainScreen').classList.add('active');
  document.getElementById('settingsUserName').textContent = userName;
  setStatus('connected');
}

// ============ TABS ============
function newTab() {
  const id = 'tab_' + Date.now();
  const tab = {
    id,
    title: 'Sohbet ' + (tabs.length + 1),
    messages: []
  };
  tabs.push(tab);
  activeTabId = id;
  saveTabs();
  renderTabs();
  renderChat();
  
  // Welcome message
  if (tabs.length === 1 || tab.messages.length === 0) {
    addMessage('assistant', `Merhaba ${userName}! Ben JARVIS. Nasıl yardımcı olabilirim? 🔵`);
  }
}

function switchTab(id) {
  activeTabId = id;
  localStorage.setItem('jarvis_active_tab', id);
  renderTabs();
  renderChat();
}

function closeTab(id, e) {
  e.stopPropagation();
  if (tabs.length === 1) { newTab(); return; }
  tabs = tabs.filter(t => t.id !== id);
  if (activeTabId === id) activeTabId = tabs[tabs.length - 1].id;
  saveTabs();
  renderTabs();
  renderChat();
}

function renderTabs() {
  const bar = document.getElementById('tabsBar');
  bar.innerHTML = '';
  
  tabs.forEach(tab => {
    const el = document.createElement('div');
    el.className = 'tab' + (tab.id === activeTabId ? ' active' : '');
    el.innerHTML = `<span>${tab.title}</span><span class="close-tab" onclick="closeTab('${tab.id}', event)">×</span>`;
    el.onclick = () => switchTab(tab.id);
    bar.appendChild(el);
  });
  
  const addBtn = document.createElement('button');
  addBtn.className = 'new-tab-btn';
  addBtn.textContent = '+';
  addBtn.onclick = newTab;
  bar.appendChild(addBtn);
}

function getActiveTab() {
  return tabs.find(t => t.id === activeTabId);
}

function saveTabs() {
  localStorage.setItem('jarvis_tabs', JSON.stringify(tabs));
  localStorage.setItem('jarvis_active_tab', activeTabId);
}

// ============ CHAT ============
function renderChat() {
  const area = document.getElementById('chatArea');
  area.innerHTML = '';
  const tab = getActiveTab();
  if (!tab) return;
  
  tab.messages.forEach(msg => {
    const el = document.createElement('div');
    el.className = 'msg ' + msg.role;
    el.textContent = msg.content;
    area.appendChild(el);
  });
  
  area.scrollTop = area.scrollHeight;
}

function addMessage(role, content) {
  const tab = getActiveTab();
  if (!tab) return;
  
  // Parse commands from assistant
  if (role === 'assistant') {
    content = parseCommands(content);
  }
  
  tab.messages.push({ role, content });
  
  // Update tab title from first user message
  if (role === 'user' && tab.messages.filter(m => m.role === 'user').length === 1) {
    tab.title = content.slice(0, 20) + (content.length > 20 ? '...' : '');
  }
  
  saveTabs();
  renderChat();
}

function parseCommands(text) {
  // Handle [OPEN:url] commands
  const openRegex = /\[OPEN:(.*?)\]/g;
  let match;
  let result = text;
  
  while ((match = openRegex.exec(text)) !== null) {
    const url = match[1];
    setTimeout(() => {
      if (confirm(`JARVIS bir şey açmak istiyor:\n${url}\n\nDevam et?`)) {
        window.open(url, '_blank');
      }
    }, 500);
    result = result.replace(match[0], `[🔗 ${url}]`);
  }
  
  return result;
}

async function sendMessage(text) {
  const input = document.getElementById('msgInput');
  const msg = text || input.value.trim();
  if (!msg) return;
  
  input.value = '';
  autoResize(input);
  
  addMessage('user', msg);
  
  // Update memory
  updateMemory(msg);
  
  // Show typing
  showTyping();
  
  try {
    const response = await callGemini(msg);
    hideTyping();
    addMessage('assistant', response);
    
    // TTS
    speak(response.replace(/\[.*?\]/g, '').trim());
    
  } catch (err) {
    hideTyping();
    addMessage('system', '⚠️ Hata: ' + err.message);
    setStatus('disconnected');
  }
}

async function callGemini(userMsg) {
  setStatus('listening');
  
  const tab = getActiveTab();
  const history = tab.messages.slice(-10).map(m => ({
    role: m.role === 'user' ? 'user' : 'model',
    parts: [{ text: m.content }]
  }));
  
  const systemPrompt = SYSTEM_PROMPT
    .replace('{NAME}', userName)
    .replace('{MEMORY}', JSON.stringify(memory, null, 2));
  
  const body = {
    system_instruction: { parts: [{ text: systemPrompt }] },
    contents: [
      ...history,
      { role: 'user', parts: [{ text: userMsg }] }
    ],
    generationConfig: {
      temperature: 0.8,
      maxOutputTokens: 1024
    }
  };
  
  const res = await fetch(
    `https://api.groq.com/openai/v1/chat/completions`,
    {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [
          { role: 'system', content: systemPrompt },
          ...history.map(m => ({ role: m.role === 'model' ? 'assistant' : m.role, content: m.parts[0].text })),
          { role: 'user', content: userMsg }
        ],
        max_tokens: 1024,
        temperature: 0.8
      })
    }
  );
  
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.error?.message || 'API hatası');
  }
  
  const data = await res.json();
  setStatus('connected');
  return data.choices?.[0]?.message?.content || 'Cevap alınamadı.';
}

// ============ MEMORY ============
function updateMemory(msg) {
  // Simple keyword-based memory
  const lower = msg.toLowerCase();
  
  if (lower.includes('adım') || lower.includes('benim adım') || lower.includes('ismim')) {
    const match = msg.match(/(?:adım|benim adım|ismim)\s+(\w+)/i);
    if (match) memory.name = match[1];
  }
  if (lower.includes('yaşındayım') || lower.includes('yaşım')) {
    const match = msg.match(/(\d+)\s*yaşın/i);
    if (match) memory.age = match[1];
  }
  if (lower.includes('istanbul') || lower.includes('ankara') || lower.includes('izmir')) {
    const cities = ['istanbul', 'ankara', 'izmir', 'bursa', 'antalya'];
    cities.forEach(c => { if (lower.includes(c)) memory.city = c; });
  }
  if (lower.includes('seviyorum') || lower.includes('severim')) {
    if (!memory.likes) memory.likes = [];
    memory.likes.push(msg.slice(0, 50));
    memory.likes = [...new Set(memory.likes)].slice(-10);
  }
  
  memory.lastSeen = new Date().toLocaleDateString('tr-TR');
  localStorage.setItem('jarvis_memory', JSON.stringify(memory));
}

function clearMemory() {
  memory = {};
  localStorage.removeItem('jarvis_memory');
  addMessage('system', '🧠 Hafıza temizlendi.');
  closeSettings();
}

// ============ TYPING INDICATOR ============
let typingEl = null;
function showTyping() {
  const area = document.getElementById('chatArea');
  typingEl = document.createElement('div');
  typingEl.className = 'typing';
  typingEl.innerHTML = '<span></span><span></span><span></span>';
  area.appendChild(typingEl);
  area.scrollTop = area.scrollHeight;
}
function hideTyping() {
  if (typingEl) { typingEl.remove(); typingEl = null; }
}

// ============ MIC / SPEECH ============
function toggleMic() {
  if (isRecording) {
    stopRecording();
  } else {
    startRecording();
  }
}

function startRecording() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('Tarayıcın ses tanımayı desteklemiyor. Chrome kullan.');
    return;
  }
  
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'tr-TR';
  recognition.continuous = false;
  recognition.interimResults = false;
  
  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('voiceIndicator').classList.add('active');
  };
  
  recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    document.getElementById('msgInput').value = transcript;
    stopRecording();
    sendMessage(transcript);
  };
  
  recognition.onerror = () => stopRecording();
  recognition.onend = () => stopRecording();
  
  recognition.start();
}

function stopRecording() {
  isRecording = false;
  document.getElementById('micBtn').classList.remove('recording');
  document.getElementById('voiceIndicator').classList.remove('active');
  if (recognition) { recognition.stop(); recognition = null; }
}

// ============ TTS ============
function speak(text) {
  if (!text || text.length > 300) return;
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'tr-TR';
    utt.rate = 1.0;
    window.speechSynthesis.speak(utt);
  }
}

// ============ QUICK ACTIONS ============
function quickAction(text) {
  document.getElementById('msgInput').value = text;
  sendMessage(text);
}

// ============ SETTINGS ============
function openSettings() {
  document.getElementById('settingsPanel').classList.add('open');
  document.getElementById('settingsUserName').textContent = userName;
}
function closeSettings() {
  document.getElementById('settingsPanel').classList.remove('open');
}
function closeSettingsOutside(e) {
  if (e.target === document.getElementById('settingsPanel')) closeSettings();
}
function clearAll() {
  tabs = [];
  localStorage.removeItem('jarvis_tabs');
  closeSettings();
  newTab();
}

// ============ STATUS ============
function setStatus(s) {
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot ' + s;
}

// ============ HELPERS ============
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ============ START ============
init();
</script>
